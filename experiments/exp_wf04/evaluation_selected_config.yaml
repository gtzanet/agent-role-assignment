topology:
  n_services: 12
  workflows:
  - id: 0
    lam: &id001
      0: 0.35
      30: 0.55
      100: 0.45
      350: 0.85
    root_service: 0
    edges:
    - - 0
      - 1
    - - 1
      - 2
  - id: 1
    lam: *id001
    root_service: 3
    edges:
    - - 3
      - 4
    - - 4
      - 5
  - id: 2
    lam: *id001
    root_service: 6
    edges:
    - - 6
      - 7
    - - 7
      - 8
  - id: 3
    lam: *id001
    root_service: 9
    edges:
    - - 9
      - 10
    - - 10
      - 11
infrastructure:
  n_nodes: 3
  cpu_max: 4
  ram: 8
  freq: 1000
simulation:
  iterations: 500
  timeout: 600000
  eval_interval: 10.0
  seed: 42
rl:
  epsilon: 0.3
  epsilon_min: 0.05
  epsilon_decay: 0.992
  alpha: 0.1
  gamma: 0.9
training:
  n_episodes: 1000
  eval_greedy_every: 10
reward:
  e2e_lat_target: 8.0
  reward_cpu_weight: 0.5
  reward_lat_viol_weight: 0.5
  agents:
    agent0:
      workflows:
        0: 0.5
        3: 0.5
      nodes:
        0: 0.5
        1: 0.5
    agent1:
      workflows:
        1: 0.5
        2: 0.5
      nodes:
        0: 0.5
        1: 0.5
    agent2:
      workflows:
        1: 0.5
        2: 0.5
      nodes:
        0: 0.5
        1: 0.5
    agent3:
      workflows:
        0: 1.0
      nodes:
        2: 1.0
    agent4:
      workflows:
        1: 1.0
      nodes:
        2: 1.0
    agent5:
      workflows:
        2: 1.0
      nodes:
        2: 1.0
    agent6:
      workflows:
        3: 1.0
      nodes:
        2: 1.0
control:
  agent_controls_replicas: false
  agent_controls_placement: false
  agent_control_assignments:
    s0.scaling: agent0
    s1.scaling: agent0
    s2.scaling: agent3
    s3.scaling: agent2
    s4.scaling: agent1
    s5.scaling: agent4
    s6.scaling: agent1
    s7.scaling: agent2
    s8.scaling: agent5
    s9.scaling: agent0
    s10.scaling: agent0
    s11.scaling: agent6
